name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      echo: ${{ steps.filter.outputs.echo }}
      helm: ${{ steps.filter.outputs.helm }}
      terraform: ${{ steps.filter.outputs.terraform }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            echo:
              - 'services/echo/**'
            helm:
              - 'deploy/charts/**'
            terraform:
              - 'infra/terraform/**'
            workflow:
              - '.github/workflows/ci.yaml'

  go-echo:
    name: echo service (Go)
    needs: changes
    if: needs.changes.outputs.echo == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/echo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/echo
          version: v1.62.2
      - name: Test
        run: go test ./...
      - name: Build image
        run: docker build -t echo:ci .

  ghcr-publish-echo:
    name: Publish echo image to GHCR
    needs: [changes, go-echo]
    if: |
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.echo == 'true' || needs.changes.outputs.workflow == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/echo
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/echo:${{ github.sha }}
            ghcr.io/${{ github.repository }}/echo:latest

  python-users:
    name: users service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/users
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: Build image
        run: docker build -t users:ci .

  helm:
    name: Helm chart checks
    needs: changes
    if: needs.changes.outputs.helm == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4
      - name: helm dependency update
        run: helm dependency update deploy/charts/echo
      - name: helm lint
        run: |
          helm lint deploy/charts/vidcast-lib
          helm lint deploy/charts/echo
      - name: helm template
        run: helm template test-release deploy/charts/echo

  terraform:
    name: Terraform checks
    needs: changes
    if: needs.changes.outputs.terraform == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"
      - name: terraform fmt
        run: terraform fmt -check -recursive infra/terraform
      - name: terraform validate (local env)
        working-directory: infra/terraform/envs/local
        run: |
          terraform init -backend=false
          terraform validate
