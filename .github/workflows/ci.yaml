name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      echo: ${{ steps.filter.outputs.echo }}
      users: ${{ steps.filter.outputs.users }}
      chat: ${{ steps.filter.outputs.chat }}
      streams: ${{ steps.filter.outputs.streams }}
      vod_recorder: ${{ steps.filter.outputs.vod_recorder }}
      helm: ${{ steps.filter.outputs.helm }}
      terraform: ${{ steps.filter.outputs.terraform }}
      argocd: ${{ steps.filter.outputs.argocd }}
      scripts: ${{ steps.filter.outputs.scripts }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            echo:
              - 'services/echo/**'
            users:
              - 'services/users/**'
            chat:
              - 'services/chat/**'
            streams:
              - 'services/streams/**'
            vod_recorder:
              - 'services/vod-recorder/**'
            helm:
              - 'deploy/charts/**'
            terraform:
              - 'infra/terraform/**'
            argocd:
              - 'deploy/argocd/**'
            scripts:
              - '.github/scripts/**'
            workflow:
              - '.github/workflows/ci.yaml'

  go-echo:
    name: echo service (Go)
    needs: changes
    if: needs.changes.outputs.echo == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/echo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/echo
          version: v1.62.2
      - name: Test
        run: go test ./...
      - name: Build image
        run: docker build -t echo:ci .

  ghcr-publish-echo:
    name: Publish echo image to GHCR
    needs: [changes, go-echo]
    if: |
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.echo == 'true' || needs.changes.outputs.workflow == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/echo
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/echo:${{ github.sha }}
            ghcr.io/${{ github.repository }}/echo:latest

  go-chat:
    name: chat service (Go)
    needs: changes
    if: needs.changes.outputs.chat == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/chat
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/chat
          version: v1.62.2
      - name: Test
        run: go test ./... -race
      - name: Build image
        run: docker build -t chat:ci .

  go-streams:
    name: streams service (Go)
    needs: changes
    if: needs.changes.outputs.streams == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/streams
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/streams
          version: v1.62.2
      - name: Test
        run: go test ./... -race
      - name: Build image
        run: docker build -t streams:ci .

  ghcr-publish-chat:
    name: Publish chat image to GHCR
    needs: [changes, go-chat]
    if: |
      needs.go-chat.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.chat == 'true' || needs.changes.outputs.workflow == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/chat
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/chat:${{ github.sha }}
            ghcr.io/${{ github.repository }}/chat:latest

  go-vod-recorder:
    name: vod-recorder tool (Go)
    needs: changes
    if: needs.changes.outputs.vod_recorder == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/vod-recorder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/vod-recorder
          version: v1.62.2
      - name: Test
        run: go test ./... -race
      - name: Build image
        run: docker build -t vod-recorder:ci .

  ghcr-publish-vod-recorder:
    name: Publish vod-recorder image to GHCR
    needs: [changes, go-vod-recorder]
    if: |
      needs.go-vod-recorder.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.vod_recorder == 'true' || needs.changes.outputs.workflow == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/vod-recorder
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/vod-recorder:${{ github.sha }}
            ghcr.io/${{ github.repository }}/vod-recorder:latest

  ghcr-publish-streams:
    name: Publish streams image to GHCR
    needs: [changes, go-streams]
    if: |
      needs.go-streams.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.streams == 'true' || needs.changes.outputs.workflow == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/streams
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/streams:${{ github.sha }}
            ghcr.io/${{ github.repository }}/streams:latest

  python-users:
    name: users service (Python)
    needs: changes
    if: needs.changes.outputs.users == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/users
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: Build image
        run: docker build -t users:ci .

  ghcr-publish-users:
    name: Publish users image to GHCR
    needs: [changes, python-users]
    if: |
      needs.python-users.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.users == 'true' || needs.changes.outputs.workflow == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/users
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/users:${{ github.sha }}
            ghcr.io/${{ github.repository }}/users:latest

  bump-image-tags:
    name: Bump image tags for GitOps
    needs: [ghcr-publish-echo, ghcr-publish-chat, ghcr-publish-users, ghcr-publish-vod-recorder]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.ghcr-publish-echo.result == 'success' ||
       needs.ghcr-publish-chat.result == 'success' ||
       needs.ghcr-publish-users.result == 'success' ||
       needs.ghcr-publish-vod-recorder.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Bump tags for images published in this run
        id: bump
        run: |
          set -e
          bumped=()
          if [ "${{ needs.ghcr-publish-echo.result }}" = "success" ]; then
            python3 .github/scripts/bump_image_tag.py deploy/argocd/apps/echo.yaml "${{ github.sha }}"
            bumped+=("echo")
          fi
          if [ "${{ needs.ghcr-publish-chat.result }}" = "success" ]; then
            python3 .github/scripts/bump_image_tag.py deploy/argocd/apps/chat.yaml "${{ github.sha }}"
            bumped+=("chat")
          fi
          if [ "${{ needs.ghcr-publish-users.result }}" = "success" ]; then
            python3 .github/scripts/bump_image_tag.py deploy/argocd/apps/users.yaml "${{ github.sha }}"
            bumped+=("users")
          fi
          if [ "${{ needs.ghcr-publish-vod-recorder.result }}" = "success" ]; then
            python3 .github/scripts/bump_image_tag.py deploy/argocd/apps/mediamtx.yaml "${{ github.sha }}"
            bumped+=("vod-recorder")
          fi
          IFS=,; echo "services=${bumped[*]}" >> "$GITHUB_OUTPUT"
      # This PR is how the bump reaches main without CI pushing to a
      # protected branch directly: `main` requires a passing-checks PR (see
      # branch protection), so we open one and let it auto-merge instead of
      # deploying to the cluster ourselves. ArgoCD's existing automated
      # sync + selfHeal (see deploy/argocd/apps/) reconciles the cluster
      # once this lands on main.
      #
      # Requires two repo settings to actually complete unattended (both
      # under Settings, off by default on a new repo):
      #   - Actions > General > Workflow permissions > "Allow GitHub
      #     Actions to create and approve pull requests" (else `gh pr
      #     create` below is rejected with a non-fatal fallback)
      #   - General > Pull Requests > "Allow auto-merge" (else `gh pr
      #     merge --auto` below is rejected)
      # Until both are on, the job still opens the PR (if creation is
      # allowed) - it just needs a human to merge it.
      - name: Open GitOps image-bump PR
        if: steps.bump.outputs.services != ''
        env:
          GH_TOKEN: ${{ github.token }}
          SERVICES: ${{ steps.bump.outputs.services }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="gitops/bump-${{ github.sha }}"
          git checkout -b "$branch"
          git add deploy/argocd/apps/echo.yaml deploy/argocd/apps/chat.yaml deploy/argocd/apps/users.yaml deploy/argocd/apps/mediamtx.yaml
          git commit -m "GitOps: bump image tag(s) to ${{ github.sha }} ($SERVICES)"
          git push origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "GitOps: bump image tag(s) to ${{ github.sha }}" \
            --body "Automated image-tag bump for: $SERVICES. Once merged, ArgoCD's automated sync reconciles the image(s) built from ${{ github.sha }}." \
            || echo "PR creation failed (enable 'Allow GitHub Actions to create and approve pull requests' under repo Settings)"
          gh pr merge "$branch" --auto --squash || echo "Auto-merge unavailable (enable it under repo Settings) - PR is open for manual merge."

  helm:
    name: Helm chart checks
    needs: changes
    if: needs.changes.outputs.helm == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4
      - name: helm dependency update
        run: |
          helm dependency update deploy/charts/echo
          helm dependency update deploy/charts/users
          helm dependency update deploy/charts/chat
      - name: helm lint
        run: |
          helm lint deploy/charts/vidcast-lib
          helm lint deploy/charts/echo
          helm lint deploy/charts/users
          helm lint deploy/charts/chat
          helm lint deploy/charts/mediamtx
      - name: helm template
        run: |
          helm template test-release deploy/charts/echo
          helm template test-release deploy/charts/users
          helm template test-release deploy/charts/chat
          helm template test-release deploy/charts/mediamtx

  terraform:
    name: Terraform checks
    needs: changes
    if: needs.changes.outputs.terraform == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"
      - name: terraform fmt
        run: terraform fmt -check -recursive infra/terraform
      - name: terraform validate (all envs)
        run: |
          set -e
          for env in infra/terraform/envs/*/; do
            echo "== ${env} =="
            terraform -chdir="${env}" init -backend=false
            # minio_root_password is required with no default; pass a dummy
            # value for the hetzner env (which intentionally omits the
            # password, requiring it at apply time) since validate never
            # applies anything. Other envs either pass the var or don't use
            # the platform module at all.
            if [ "${env}" = "infra/terraform/envs/hetzner/" ]; then
              TF_VAR_minio_root_password=dummy terraform -chdir="${env}" validate
            else
              terraform -chdir="${env}" validate
            fi
          done

  argocd:
    name: ArgoCD manifest checks
    needs: changes
    if: needs.changes.outputs.argocd == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml==6.0.2
      - name: Validate Application manifests
        run: python3 .github/scripts/validate_argocd_apps.py

  gitops-scripts:
    name: GitOps scripts checks
    needs: changes
    if: needs.changes.outputs.scripts == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit test bump_image_tag.py
        working-directory: .github/scripts
        run: python3 -m unittest test_bump_image_tag.py -v
