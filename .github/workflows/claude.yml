name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Automatic PR review (bare pull_request event, no mention). Needs an
      # explicit prompt and tool allowlist since agent-mode has no GitHub
      # write access by default.
      - name: Run Claude Code (PR auto-review)
        id: claude-pr-review
        if: github.event_name == 'pull_request'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for:
            - correctness and potential bugs
            - edge cases
            - security issues
            - performance concerns
            - code style and maintainability

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - do not submit review text as plain messages.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      # @claude-mention-triggered runs (issue_comment, pull_request_review,
      # pull_request_review_comment, issues). Deliberately omits prompt/
      # claude_args entirely - even passing an empty string here makes the
      # action treat it as "use this as the full prompt" instead of falling
      # back to reading the triggering comment, which breaks mention
      # handling. Keep this step free of those inputs.
      - name: Run Claude Code (mention-triggered)
        id: claude-mention
        if: github.event_name != 'pull_request'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          claude_args: |
            --append-system-prompt "You can resolve a GitHub PR review conversation/thread (the 'Resolve conversation' feature) using gh api graphql: the mutation is resolveReviewThread(input:{threadId:ID}). Find the thread's GraphQL node id via the reviewThreads query on the pull request, matching by comment databaseId against the comment you were triggered from. Only resolve a thread after verifying in the current code that the underlying concern is genuinely addressed - do not resolve just because you were asked to. If you disagree it is resolved, reply explaining why instead of resolving it."

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
