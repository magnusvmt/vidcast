name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  # Scoped to the specific comment/review when one exists (issue_comment,
  # pull_request_review_comment, pull_request_review) so that near-simultaneous
  # @claude replies on different threads/comments of the same PR run
  # independently instead of cancelling each other. Falls back to PR/issue
  # number for events without a comment, e.g. the bare `pull_request` auto-review.
  group: claude-${{ github.event_name }}-${{ github.event.comment.id || github.event.review.id || github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # claude-code-action performs its own workflow-identity check before
      # running: if this branch's copy of claude.yml differs from main's, it
      # skips silently (job conclusion is still "success", no error anywhere)
      # rather than risk running a modified workflow with elevated
      # permissions - see anthropics/claude-code-action's token exchange,
      # which rejects with "workflow_not_found_on_default_branch" and the
      # action swallows that as a silent skip. That's a deliberate anti
      # supply-chain-attack measure and must not be bypassed. Long-lived PR
      # branches that predate a claude.yml change on main hit this
      # indefinitely with zero visible signal (#54). Detect the same
      # mismatch ourselves here - cheap, read-only, no elevated permissions -
      # so we can post a visible warning instead of doing nothing.
      - name: Detect stale claude.yml relative to main
        id: check-stale-workflow
        if: |
          github.event_name == 'pull_request' ||
          github.event_name == 'pull_request_review' ||
          github.event_name == 'pull_request_review_comment' ||
          (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if [ -z "$HEAD_SHA" ]; then
            HEAD_SHA=$(gh pr view "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)
          fi
          MAIN_BLOB=$(gh api "repos/${{ github.repository }}/contents/.github/workflows/claude.yml?ref=main" --jq .sha)
          PR_BLOB=$(gh api "repos/${{ github.repository }}/contents/.github/workflows/claude.yml?ref=$HEAD_SHA" --jq .sha)
          if [ -n "$MAIN_BLOB" ] && [ -n "$PR_BLOB" ] && [ "$MAIN_BLOB" != "$PR_BLOB" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn about stale claude.yml
        if: steps.check-stale-workflow.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          gh issue comment "$NUMBER" --repo "${{ github.repository }}" --body "$(cat <<'EOF'
          ⚠️ **`@claude` and automatic PR review are currently disabled on this branch.**

          This PR's copy of `.github/workflows/claude.yml` differs from `main`. `claude-code-action` treats that as a workflow-identity mismatch and silently skips running (the job still shows as a green ✅, with no error) to avoid executing a modified workflow with elevated permissions. See [#54](https://github.com/magnusvmt/vidcast/issues/54).

          Merge or rebase `main` into this branch to pick up the current `claude.yml` and restore `@claude` mentions and automatic PR review.
          EOF
          )"

      # A `synchronize` event fires on every push to the PR branch, including
      # a rebase that rewrites commit SHAs without changing the actual diff
      # against base - the auto-review below has no memory between runs, so
      # a rebase-only push made it fully re-review already-reviewed code and
      # re-post findings already fixed/addressed, wasting a review pass and
      # adding to the comment volume that has previously triggered SDK
      # flakiness under concurrent same-PR invocation (see the note on the
      # mention-triggered step below). Compare the diff against base
      # before/after the push; skip the review only when they're identical.
      # If the old `before` commit is no longer fetchable (e.g. already
      # garbage-collected after an earlier force-push), fail open - treat it
      # as changed and still review - rather than silently skip a real one.
      - name: Detect no-op rebase (diff against base unchanged)
        id: diff-check
        if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
        run: |
          before="${{ github.event.before }}"
          after="${{ github.event.after }}"
          base="${{ github.event.pull_request.base.sha }}"
          git fetch --quiet origin "$before" "$after" "$base" 2>/dev/null || true
          if git cat-file -e "$before^{commit}" 2>/dev/null && \
             git cat-file -e "$after^{commit}" 2>/dev/null && \
             git cat-file -e "$base^{commit}" 2>/dev/null; then
            before_diff="$(git diff "$base" "$before" | git hash-object --stdin)"
            after_diff="$(git diff "$base" "$after" | git hash-object --stdin)"
            if [ "$before_diff" = "$after_diff" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Automatic PR review (bare pull_request event, no mention). Needs an
      # explicit prompt and tool allowlist since agent-mode has no GitHub
      # write access by default.
      - name: Run Claude Code (PR auto-review)
        id: claude-pr-review
        if: github.event_name == 'pull_request' && steps.check-stale-workflow.outputs.stale != 'true' && steps.diff-check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for:
            - correctness and potential bugs
            - edge cases
            - security issues
            - performance concerns
            - code style and maintainability

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - do not submit review text as plain messages.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      # @claude-mention-triggered runs (issue_comment, pull_request_review,
      # pull_request_review_comment, issues). Deliberately omits prompt/
      # claude_args entirely - even passing an empty string here makes the
      # action treat it as "use this as the full prompt" instead of falling
      # back to reading the triggering comment, which breaks mention
      # handling. Keep this step free of those inputs.
      - name: Run Claude Code (mention-triggered)
        id: claude-mention
        if: github.event_name != 'pull_request' && steps.check-stale-workflow.outputs.stale != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          # git diff/log/show and gh pr view/diff are allowed below because
          # verifying a "please resolve this thread" claim requires seeing the
          # actual fix commit and PR diff, not just the checked-out file
          # contents. Without them the run burned its permission-denial budget
          # on these reads before it ever got to the graphql call (see #52).
          claude_args: |
            --append-system-prompt "You can resolve a GitHub PR review conversation/thread (the 'Resolve conversation' feature) using gh api graphql: the mutation is resolveReviewThread(input:{threadId:ID}); thread node ids come from the reviewThreads query on the pull request. If you were triggered from a specific review-thread comment, match that thread by comment databaseId and only resolve that one thread. If instead you were triggered from a general PR comment (not attached to any specific thread) asking you to review and resolve everything you agree is addressed, fetch all reviewThreads on the PR and evaluate each currently-unresolved one independently against these three cases: (1) the underlying concern is genuinely addressed in the current code - resolve it and say what fix/commit addressed it; (2) it was explicitly deferred by the PR author to a tracked issue / marked out of scope - resolve it and say why the deferral was appropriate; (3) it is your own (or another reviewer's) non-blocking suggestion or observation - not a confirmed bug, security issue, or behavior you'd stand behind as required before merge - and nobody has since argued it should block this PR - resolve it yourself as the reviewer and say plainly that it's optional/non-blocking and why, without waiting for the author to reply first. Otherwise (a genuine unaddressed bug or risk with no fix and no deferral) leave it open and explain what's still missing. Only resolve a thread after actually verifying which of these cases applies - do not resolve just because you were asked to, and do not use case (3) to wave away something you'd actually consider a real defect. Always leave a short reply explaining your reasoning on every thread you touch, resolved or not, so a human reviewing later can see why without re-reading the whole thread. Only skip the reply if the thread was already left alone by a prior run for the same reason (e.g. explicitly deferred, no new mention since) - do not repeat yourself."
            --allowedTools "Bash(gh api graphql:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(gh pr view:*),Bash(gh pr diff:*)"

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
