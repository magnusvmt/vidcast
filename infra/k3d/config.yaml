apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: vidcast
servers: 1
agents: 2
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
  # RTMP ingest (MediaMTX) - not HTTP, so it can't share the 80/443
  # Traefik ingress and needs its own port published to the host.
  - port: 1935:1935
    nodeFilters:
      - loadbalancer
registries:
  create:
    name: vidcast-registry
    host: "0.0.0.0"
    hostPort: "5001"
options:
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
