apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chat
  namespace: platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/magnusvmt/vidcast.git
    targetRevision: main
    path: deploy/charts/chat
    helm:
      # See echo.yaml for why this overrides the chart's own values.yaml.
      valuesObject:
        image:
          repository: ghcr.io/magnusvmt/vidcast/chat
          tag: ffb25aaf54dc2bc7ab5d6bb9b18d060b9cc5d6da
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
