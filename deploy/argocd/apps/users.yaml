apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: users
  namespace: platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/magnusvmt/vidcast.git
    targetRevision: main
    path: deploy/charts/users
    helm:
      # See echo.yaml for why this overrides the chart's own values.yaml.
      valuesObject:
        image:
          repository: ghcr.io/magnusvmt/vidcast/users
          tag: 7a06700843bdf8b462c04827d7522a4cfc42838b
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
