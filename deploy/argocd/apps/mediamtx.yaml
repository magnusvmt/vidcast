apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mediamtx
  namespace: platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/magnusvmt/vidcast.git
    targetRevision: main
    path: deploy/charts/mediamtx
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
