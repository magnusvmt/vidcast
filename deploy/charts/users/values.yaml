replicaCount: 2

image:
  # in-cluster nodes resolve the k3d-managed registry by its container name,
  # not localhost:5001 (that's only reachable from the host for `docker push`)
  repository: vidcast-registry:5000/users
  tag: dev
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  host: users.vidcast.localhost
  annotations: {}

probes:
  # /healthz checks DB connectivity, unlike / which just reports version
  path: /healthz
  # The handler has no explicit timeout and relies on the Postgres driver; give kubelet headroom
  timeoutSeconds: 5

env:
  - name: VERSION
    value: dev
  # Explicit rather than relying on the app's own "development" default, so
  # deployed behavior (JWT secret strength check, docs exposure) doesn't
  # silently change if that default is ever edited in app code.
  - name: ENVIRONMENT
    value: development

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# runAsUser defaults to 65532 (distroless's "nonroot" UID) in vidcast-lib
securityContext: {}
