replicaCount: 2

image:
  # in-cluster nodes resolve the k3d-managed registry by its container name,
  # not localhost:5001 (that's only reachable from the host for `docker push`)
  repository: vidcast-registry:5000/chat
  tag: dev
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  host: chat.vidcast.localhost
  annotations: {}

probes:
  # /healthz checks Redis connectivity, unlike / which just reports version
  path: /healthz
  # The handler's Redis Ping has a 2s ctx timeout; give kubelet headroom (default 1s)
  timeoutSeconds: 3

env:
  - name: VERSION
    value: dev

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

# runAsUser defaults to 65532 (distroless's "nonroot" UID) in vidcast-lib
securityContext: {}
