# MediaMTX keeps published streams in each pod's memory, so replicas don't
# share state - a viewer routed to a different pod than the publisher would
# see no stream. Keep this at 1 until clustering config is added.
replicaCount: 1

image:
  # Built from services/vod-recorder's Dockerfile: the official
  # bluenviron/mediamtx:1.19.2 image (still a single static binary on
  # scratch) with one extra static binary layered on top, so
  # runOnRecordSegmentComplete (see recording.enabled below) has something
  # to exec - MediaMTX has no native S3 upload support. Behavior is
  # identical to the upstream image when recording.enabled is false.
  repository: ghcr.io/magnusvmt/vidcast/vod-recorder
  tag: "latest"
  pullPolicy: IfNotPresent

rtmp:
  port: 1935
  service:
    # RTMP isn't HTTP, so it can't ride the Traefik ingress like the other
    # charts' HTTP services - it needs its own externally reachable port.
    # NodePort also works by overriding type where no LB is available.
    #
    # WARNING: LoadBalancer publishes an unauthenticated ingest endpoint.
    # Anyone who can reach the LB IP on port 1935 can publish (or overwrite)
    # a stream, since MediaMTX's auth webhook is out of scope for this chart
    # (tracked in #20). Do not point this at a real internet-reachable LB
    # until auth is implemented.
    type: LoadBalancer

hls:
  port: 8888
  service:
    port: 80
  ingress:
    enabled: true
    host: mediamtx.vidcast.localhost
    annotations: {}

recording:
  # Off by default: enabling requires an S3-compatible bucket to actually
  # exist (see infra/terraform/modules/platform's minio helm_release) and
  # the s3 fields below to point at it.
  enabled: false
  # Minimum duration of each recorded segment before it's closed, uploaded,
  # and a new one started - MediaMTX's own recordSegmentDuration setting.
  segmentDuration: 1h
  # Local-disk backstop: normally vod-recorder deletes each segment right
  # after a successful upload, but if that fails for some reason this is
  # what actually bounds the emptyDir's growth.
  deleteAfter: 24h
  s3:
    endpoint: http://minio.apps.svc.cluster.local:9000
    bucket: vod-recordings
    usePathStyle: true
    # Matches the Secret the official minio/minio chart generates for a
    # release named "minio" in this namespace (see
    # infra/terraform/modules/platform's minio helm_release) - override if
    # existingSecret was set instead, or the release is named differently.
    existingSecret: minio
    accessKeyKey: rootUser
    secretKeyKey: rootPassword

probes:
  timeoutSeconds: 5

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 128Mi

# runAsUser defaults to 65532 in the deployment template, same convention as
# vidcast-lib's services even though this chart doesn't depend on it.
securityContext: {}
