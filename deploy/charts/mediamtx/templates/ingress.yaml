{{- if .Values.hls.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-hls
  labels:
    {{- include "mediamtx.labels" . | nindent 4 }}
  {{- with .Values.hls.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  rules:
    - host: {{ .Values.hls.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-hls
                port:
                  number: {{ .Values.hls.service.port }}
{{- end }}
